name: Feature Request
description: Propose a new feature or enhancement for Garage OS
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new features or enhancements.
        Before submitting, confirm the request aligns with Architecture Baseline v0.3.4 and existing decisions in DECISIONS.md.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who is affected?
      placeholder: "As a [user type], I need [capability] because [reason]..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you would like to see.
      placeholder: "Detailed description of the proposed solution..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches were considered and why were they rejected?
      placeholder: "List alternative solutions and why this proposal is preferred..."

  - type: textarea
    id: decision_reference
    attributes:
      label: Related Decision Reference
      description: Does this feature relate to or extend any decisions in DECISIONS.md?
      placeholder: |
        - Decision #1: Activities Are the Single Source of Truth
        - Decision #3: Vehicle Workspace is Center of Application
        - No related decisions

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is complete?
      placeholder: |
        - [ ] User can...
        - [ ] System handles...
        - [ ] Edge case: ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, or any other context that helps explain the feature.
      placeholder: "Attach files or add links here..."
