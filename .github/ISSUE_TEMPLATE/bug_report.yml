name: Bug Report
description: Report a bug or unexpected behavior in Garage OS
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug.
      placeholder: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Open the app
        2. Navigate to...
        3. Tap...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: "Describe the expected outcome..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Describe what actually occurred..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about the environment where the bug occurred.
      placeholder: |
        - Device: iPhone 15 Pro
        - OS: iOS 17.4
        - App Version: 0.1.0
        - Build: TestFlight / Local
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Attach screenshots, screen recordings, or error logs if available.
      placeholder: "Drag and drop files here, or paste error messages..."

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low - Minor visual issue
        - Medium - Feature partially broken
        - High - Feature completely broken
        - Critical - App crash or data loss
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, related issues, or architecture decisions relevant to this bug.
      placeholder: "Reference DECISIONS.md if applicable..."
